body:
  text: 之一碑陽額大代宕昌公暉福寺碑本文夫玄宗幽寂非名相之所詮至韻沖莫非稱謂之所攝妙絕稱謂微言以之載揚體非名相圜像以之而應故群有殊致道以經焉萬流競津法以紀焉是以神曦騰曜鏡重昏於大千三乘肇唱拯沈黎於炎宅用能慈液流於當時惠慶光於曠劫自世道交喪靈燭潛暉攸攸群夢靡照靡矜我皇文明自天超世高悟鼓淳風以懷萬邦灑靈澤以霑九服兼遐想虛宗遵崇道教太皇太后聖慮淵詳道心幽暢協宣皇極百揆挺惟新之明緝熙庶績八表流擊壤之詠雖智周世而方外之志不虧形應萬機而恬素之真弗擾故能優遊紫宮憲章遺法紹靈鷲於溥天摹祇桓於振旦非夫天縱在躬量齊虛受其熟能令英風藹而重扇玄猷淪而再揚哉散騎常侍安西將軍吏部內行尚書宕昌公王慶時資性朗茂秉心淵懿位亞台衡任摠機密翼贊之功光於帝庭忠規之節彰於朝司每惟會施之誠罔申謝生之懃莫報庶憑冥津玄期有寄乃磬竭丹誠於本鄉南北舊宅上為二聖造三級佛圖各一區規崇爽塏擇形勝之地臨沃衍據條剛面脩巘而帶洛川佩黃河而負龍門伐良松於華畎之陰掇文瑤於荊山之陽旌功銳巧窮妙極思爰自經始三載而就崇基重構層欄疊起法堂禪室通閣連暉翠林淥流含榮遞暎蔚若靈椿之茂春陽嵬若翔雲之籠濛汜金儀赫曜彩絢光備覩之者則瀅發道心藻除塵垢悕玄者則陶真煉和遺形忘返諒罕代之神規當今之莊觀者矣夫功高德盛徽聲播於管弦業隆曠載刊迹流於後昆所以光宣軌摹永垂不朽故姻舊慶慈善之至邑里感惠訓之誠遂鐫石立言式揚暉烈庶洪因鍾於聖躬微津延於先住其辭曰淵哉沖猷微矣虛宗昏邪交扇氛徒競鋒有覺爰興超悟玄蹤志懃淨境開拯塵蒙於顯大代長發其祥景運承苻世有喆王后皇高悟道風載揚哀此群或照彼祈鄉化因道感道由人敷愔愔安西秉德陳謨冥期幽屬廓茲靈圖曾是暉福慶崇皇居爰建靈寺妙契天規飛椽雲翔浮欄籠曦金儀燭曜功殫世奇蔚如崑峰瑍若珠麗閑堂寂寥禪室虛沖朱櫺吐霞翠戶含風僧徒遊宴幽宗是融心栖化表形寓俗中靈津匪遼照則鏡蛻神豈緬藻荃則淨庶運微因慶鍾皇聖爰覬先慈永超塵徑太和十二年歲在戊辰七月己卯朔一日建之二碑陰父佛弟子安西將軍秦州刺史澄城公王貴隆兄佛弟子華州主薄王阿兄佛弟子寧遠將軍澄城太守遷雍州刺史澄城侯王容暉兄佛弟子寧朔將軍河東太守澄城子遷澄城太守王桃仁兄子佛弟子本郡功曹遷為威遠將軍澄城太守夏兄子佛弟子鷹陽將軍華州戍將王元龜世子佛弟子內行內小王道訓弟二子佛弟子中書學生王榮宗秘書著作郎傅思孟剬文定州鉅鏕蘇棠刊文
